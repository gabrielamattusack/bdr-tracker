
<div style="font-family:sans-serif;padding:24px;background:#13131f;border-radius:16px;color:#f0f0f5;text-align:center">
  <div style="font-size:32px;margin-bottom:12px">📥</div>
  <div style="font-size:16px;font-weight:600;margin-bottom:8px">Arquivo pronto</div>
  <div style="font-size:13px;color:#8888aa;margin-bottom:20px">Clique para baixar o index.html final</div>
  <button id="dl" style="background:#25d366;color:#071a0d;border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer">
    ⬇ Baixar index.html
  </button>
  <div id="msg" style="margin-top:12px;font-size:12px;color:#555570"></div>
</div>
<script>
document.getElementById('dl').onclick = function(){
  fetch('/home/claude/index.html')
    .then(function(r){ return r.text() })
    .then(function(html){
      var blob = new Blob([html], {type:'text/html'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      a.click();
      document.getElementById('msg').textContent = 'Download iniciado!';
    })
    .catch(function(){
      document.getElementById('msg').textContent = 'Não foi possível acessar via fetch. Use o método abaixo.';
    });
};
</script>
